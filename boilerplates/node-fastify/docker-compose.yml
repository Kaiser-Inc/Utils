services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boilerplate
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"

  api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
