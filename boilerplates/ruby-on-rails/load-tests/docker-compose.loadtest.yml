services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boilerplate_loadtest
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d boilerplate_loadtest"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["./bin/rails", "server", "-b", "0.0.0.0"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://docker:docker@db:5432/boilerplate_loadtest
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  k6:
    image: grafana/k6:0.56.0
    command: run /scripts/auth.js
    volumes:
      - ./k6:/scripts
    environment:
      - BASE_URL=http://api:3000
    depends_on:
      api:
        condition: service_healthy
