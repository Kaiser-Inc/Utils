services:
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: boilerplate
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ../.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"

  locust-master:
    image: locustio/locust:2.32.3
    command: >
      -f /locustfile.py
      --master
      --host http://api:8000
    ports:
      - "8089:8089"
      - "5557:5557"
    volumes:
      - ./locustfile.py:/locustfile.py:ro
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

  locust-worker:
    image: locustio/locust:2.32.3
    command: >
      -f /locustfile.py
      --worker
      --master-host locust-master
    volumes:
      - ./locustfile.py:/locustfile.py:ro
    environment:
      API_URL: http://api:8000
    depends_on:
      - locust-master
    deploy:
      replicas: 2

volumes:
  postgres_data:
